<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Mon premier RAG</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #fafafa;
    --surface: #ffffff;
    --border: #e5e7eb;
    --text: #18181b;
    --text-muted: #71717a;
    --accent: #4f46e5;
    --accent-hover: #4338ca;
    --success: #16a34a;
    --danger: #dc2626;
    --radius: 12px;
    --shadow: 0 1px 2px rgba(0,0,0,.04), 0 4px 12px rgba(0,0,0,.04);
  }
  * { box-sizing: border-box; }
  body { font-family: "Inter", system-ui, sans-serif; max-width: 720px; margin: 0 auto; padding: 56px 20px 80px; background: var(--bg); color: var(--text); line-height: 1.5; }
  header { margin-bottom: 32px; }
  h1 { font-size: 1.6rem; font-weight: 700; letter-spacing: -0.02em; margin: 0 0 8px; }
  .hint { color: var(--text-muted); font-size: .95rem; margin: 0; }
  form { display: flex; gap: 10px; margin: 24px 0; }
  input {
    flex: 1; padding: 12px 16px; font-size: 1rem; font-family: inherit;
    border: 1px solid var(--border); border-radius: var(--radius);
    background: var(--surface); color: var(--text);
    transition: border-color .15s, box-shadow .15s;
  }
  input:focus {
    outline: none; border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(79,70,229,.12);
  }
  button {
    padding: 12px 22px; font-size: .95rem; font-weight: 600; font-family: inherit;
    border: none; border-radius: var(--radius); background: var(--accent); color: #fff;
    cursor: pointer; transition: background-color .15s, transform .1s;
  }
  button:hover:not(:disabled) { background: var(--accent-hover); }
  button:active:not(:disabled) { transform: scale(.97); }
  button:disabled { background: #d4d4d8; cursor: wait; }
  .card {
    background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius);
    padding: 16px 18px; margin-bottom: 12px; box-shadow: var(--shadow);
  }
  .card strong { display: flex; align-items: center; gap: 6px; font-size: .85rem; letter-spacing: .01em; text-transform: uppercase; }
  .blocked { border-left: 3px solid var(--danger); }
  .blocked strong { color: var(--danger); }
  .ok strong { color: var(--success); }
  .chunk { font-size: .88rem; color: var(--text-muted); margin: 10px 0 0; padding-top: 10px; border-top: 1px dashed var(--border); }
  .chunk:first-of-type { border-top: none; padding-top: 0; }
  .dist { color: #a1a1aa; font-size: .78rem; font-variant-numeric: tabular-nums; }
  #status { color: #888; min-height: 1.2em; }
  .answer p { margin: 8px 0; }
  .answer ul, .answer ol { margin: 8px 0; padding-left: 24px; }
  .answer li { margin: 4px 0; }
  .history-header { display: flex; align-items: center; justify-content: space-between; margin-top: 40px; padding-bottom: 12px; border-bottom: 1px solid var(--border); }
  .history-header h2 { font-size: 1rem; font-weight: 600; margin: 0; color: var(--text); }
  #clear-history { background: none; border: 1px solid #bbb; color: #666; padding: 6px 12px; font-size: .85rem; }
  #clear-history:hover { background: #eee; }
  .question-label { font-size: .85rem; color: #2d6cdf; font-weight: 600; margin-bottom: 6px; }
  .exchange { margin-bottom: 22px; padding-bottom: 22px; border-bottom: 1px solid #e2e2e2; }
  .exchange:last-child { border-bottom: none; }
</style>
</head>
<body>
<header>
  <h1>Mon premier RAG</h1>
  <p class="hint">Pose une question sur le corpus, par exemple : <em>Quelle est la couleur du chat de Bob ?</em>,
  <em>Qui est le maire de Villebrume ?</em> — ou essaie une injection pour tester le modérateur.</p>
</header>

<form id="form">
  <input id="question" placeholder="Ta question..." autocomplete="off" required>
  <button id="send" type="submit">Demander</button>
</form>
<p id="status"></p>

<div class="history-header">
  <h2>Historique de la session <span id="history-count" class="hint"></span></h2>
  <button id="clear-history" type="button">Effacer l'historique</button>
</div>
<div id="result"></div>

<script>
const form = document.getElementById("form");
const status = document.getElementById("status");
const resultDiv = document.getElementById("result");
const clearBtn = document.getElementById("clear-history");
const historyCount = document.getElementById("history-count");
let exchangeCount = 0;

function updateHistoryCount() {
  historyCount.textContent = exchangeCount > 0 ? `(${exchangeCount})` : "";
}

clearBtn.addEventListener("click", () => {
  resultDiv.innerHTML = "";
  exchangeCount = 0;
  updateHistoryCount();
});

// Échappe le HTML pour ne jamais injecter de balises venant du LLM
function escapeHtml(s) {
  return s.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
}

// Convertit le Markdown de la réponse (gras, italique, listes) en HTML propre
function renderMarkdown(text) {
  const lines = escapeHtml(text).split("\n");
  let html = "", list = null; // list = "ul" | "ol" | null

  const closeList = () => { if (list) { html += `</${list}>`; list = null; } };
  const inline = (s) => s
    .replace(/\*\*(.+?)\*\*/g, "<strong>$1</strong>")
    .replace(/\*(.+?)\*/g, "<em>$1</em>");

  for (const raw of lines) {
    const line = raw.trim();
    if (line.startsWith("- ") || line.startsWith("* ")) {
      if (list !== "ul") { closeList(); html += "<ul>"; list = "ul"; }
      html += `<li>${inline(line.slice(2))}</li>`;
    } else if (/^\d+[.)]\s/.test(line)) {
      if (list !== "ol") { closeList(); html += "<ol>"; list = "ol"; }
      html += `<li>${inline(line.replace(/^\d+[.)]\s/, ""))}</li>`;
    } else if (line === "") {
      closeList();
    } else {
      closeList();
      html += `<p>${inline(line)}</p>`;
    }
  }
  closeList();
  return html;
}

// Construit le bloc HTML d'un echange question/reponse pour l'historique
function renderExchange(question, data) {
  const blocked = data.moderation && data.moderation.is_prompt_injection === true;

  let html = `<div class="exchange">
    <div class="question-label">Q : ${escapeHtml(question)}</div>
    <div class="card ${blocked ? "blocked" : "ok"}">
      <strong>${blocked ? "🛑 Question bloquée par le modérateur" : "Réponse"}</strong>
      <div class="answer">${renderMarkdown(data.answer)}</div>
    </div>`;

  if (data.chunks && data.chunks.length) {
    html += `<div class="card"><strong>Sources utilisées (de la plus à la moins pertinente)</strong>` +
      data.chunks.map(c =>
        `<p class="chunk">[${c.id}] ${escapeHtml(c.text)} <span class="dist">distance : ${c.distance.toFixed(3)}</span></p>`
      ).join("") + `</div>`;
  }
  return html + `</div>`;
}

form.addEventListener("submit", async (e) => {
  e.preventDefault();
  const questionInput = document.getElementById("question");
  const question = questionInput.value;
  const btn = document.getElementById("send");
  btn.disabled = true;
  status.textContent = "Modération puis recherche en cours...";
  try {
    const res = await fetch("/ask", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ question })
    });
    if (!res.ok) throw new Error("Erreur serveur " + res.status);
    const data = await res.json();
    // Le nouvel echange s'ajoute en tete de l'historique, sans effacer les precedents
    resultDiv.insertAdjacentHTML("afterbegin", renderExchange(question, data));
    exchangeCount++;
    updateHistoryCount();
    status.textContent = "";
    questionInput.value = "";
  } catch (err) {
    status.textContent = "Erreur : " + err.message;
  } finally {
    btn.disabled = false;
  }
});
</script>
</body>
</html>
